services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "9000:5000"
    environment:
      ConnectionStrings__Default: "Server=db,1433;Database=gentlesuite;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=False;TrustServerCertificate=True"
      Smtp__Host: mailpit
      Smtp__Port: 1025
      Smtp__FromEmail: noreply@gentlegroup.de
      Smtp__FromName: GentleGroup
      FrontendBaseUrl: http://localhost:3000
    depends_on:
      - db
      - mailpit

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:9000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9000
    depends_on:
      - api

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mssqldata:
