services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gentlesuite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "9000:5000"
    environment:
      ConnectionStrings__Default: "Host=db;Database=gentlesuite;Username=postgres;Password=postgres"
      Smtp__Host: mailpit
      Smtp__Port: 1025
      FrontendBaseUrl: http://localhost:3000
    depends_on:
      - db
      - mailpit

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:9000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9000
    depends_on:
      - api

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
